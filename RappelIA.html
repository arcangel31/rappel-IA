<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0F14">
<title>RappelIA</title>
<style>
:root{--c-normal:#4A9EFF;--c-urgent:#FF4F4F;--c-bg:#0F0F14;--c-bg2:#1A1A22;--c-bg3:#242430;--c-border:rgba(255,255,255,0.07);--c-border2:rgba(255,255,255,0.13);--c-text:#EDEDF4;--c-muted:#888899;--c-hint:#44445A}
@media(prefers-color-scheme:light){:root{--c-bg:#F5F5FA;--c-bg2:#FFFFFF;--c-bg3:#EAEAF2;--c-border:rgba(0,0,0,0.07);--c-border2:rgba(0,0,0,0.12);--c-text:#111120;--c-muted:#6A6A80;--c-hint:#AAAAC0}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--c-bg)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--c-text)}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.hdr{background:var(--c-bg2);border-bottom:0.5px solid var(--c-border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-icon{width:38px;height:38px;border-radius:12px;background:rgba(74,158,255,0.1);border:0.5px solid rgba(74,158,255,0.25);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-title{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.hdr-sub{font-size:11px;color:var(--c-muted);margin-top:1px}
.hdr-clock{margin-left:auto;font-size:14px;font-weight:500;color:var(--c-muted);font-variant-numeric:tabular-nums;letter-spacing:.5px}
.scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:3px}
.banner{margin:10px 12px 0;border-radius:12px;padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.banner-warn{background:rgba(255,140,0,0.1);border:0.5px solid rgba(255,140,0,0.3);color:#FF8C00}
.banner-ok{background:rgba(74,158,255,0.08);border:0.5px solid rgba(74,158,255,0.22);color:var(--c-normal);cursor:default}
.ai-card{margin:12px;background:var(--c-bg2);border-radius:16px;border:0.5px solid var(--c-border)}
.ai-lbl{padding:12px 14px 0;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--c-muted)}
.ai-ta{width:100%;border:none;background:transparent;color:var(--c-text);font-size:14px;font-family:inherit;padding:10px 14px;resize:none;outline:none;line-height:1.55;min-height:72px}
.ai-ta::placeholder{color:var(--c-hint)}
.ai-foot{padding:8px 10px;display:flex;align-items:center;gap:8px;border-top:0.5px solid var(--c-border)}
.chips{display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{font-size:11px;padding:5px 10px;border-radius:20px;background:var(--c-bg3);border:0.5px solid var(--c-border);color:var(--c-muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip:active{background:var(--c-border2)}
.ai-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--c-normal);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .12s}
.ai-btn:disabled{opacity:.35;cursor:not-allowed}
.ai-btn:active:not(:disabled){transform:scale(.9)}
.ai-status{padding:6px 14px 10px;font-size:12px;color:var(--c-muted);min-height:30px;font-style:italic}
.sec-lbl{padding:4px 16px 6px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--c-muted)}
.list{margin:0 12px;display:flex;flex-direction:column;gap:8px}
.r-card{background:var(--c-bg2);border-radius:14px;border:0.5px solid var(--c-border);padding:13px 14px;display:flex;align-items:center;gap:12px;animation:slIn .22s ease}
@keyframes slIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.r-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.r-icon.normal{background:rgba(74,158,255,0.1)}
.r-icon.urgent{background:rgba(255,79,79,0.1)}
.r-body{flex:1;min-width:0}
.r-msg{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:11px;color:var(--c-muted);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.r-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.r-badge.normal{background:rgba(74,158,255,0.12);color:var(--c-normal)}
.r-badge.urgent{background:rgba(255,79,79,0.12);color:var(--c-urgent)}
.r-del{width:30px;height:30px;border-radius:50%;background:transparent;border:0.5px solid var(--c-border);color:var(--c-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.r-del:active{background:rgba(255,79,79,0.12);color:var(--c-urgent)}
.empty{text-align:center;padding:52px 24px 24px;color:var(--c-hint)}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-text{font-size:14px;line-height:1.6}
.alarm-wrap{display:none;position:absolute;inset:0;z-index:99;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;padding:24px}
.alarm-wrap.on{display:flex;animation:fdIn .25s ease}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
.alarm-box{background:var(--c-bg2);border-radius:24px;border:0.5px solid var(--c-border2);padding:32px 24px;width:100%;max-width:340px;text-align:center}
.alarm-anim{width:68px;height:68px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:30px}
.alarm-anim.normal{background:rgba(74,158,255,0.1);animation:pN 1.4s ease-in-out infinite}
.alarm-anim.urgent{background:rgba(255,79,79,0.1);animation:pU .55s ease-in-out infinite}
@keyframes pN{0%,100%{box-shadow:0 0 0 0 rgba(74,158,255,.3)}50%{box-shadow:0 0 0 14px rgba(74,158,255,.06)}}
@keyframes pU{0%,100%{box-shadow:0 0 0 0 rgba(255,79,79,.4)}50%{box-shadow:0 0 0 18px rgba(255,79,79,.07)}}
.alarm-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.alarm-badge.normal{background:rgba(74,158,255,.12);color:var(--c-normal)}
.alarm-badge.urgent{background:rgba(255,79,79,.12);color:var(--c-urgent)}
.alarm-msg{font-size:20px;font-weight:600;line-height:1.3;margin-bottom:6px}
.alarm-time{font-size:13px;color:var(--c-muted);margin-bottom:28px}
.alarm-ok{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.alarm-ok.normal{background:var(--c-normal);color:#fff}
.alarm-ok.urgent{background:var(--c-urgent);color:#fff}
.alarm-ok:active{transform:scale(.97);opacity:.85}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}
.dots span{animation:dot 1.2s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon">🔔</div>
    <div>
      <div class="hdr-title">RappelIA</div>
      <div class="hdr-sub">Rappels intelligents</div>
    </div>
    <div class="hdr-clock" id="clock">--:--</div>
  </div>
  <div class="scroll">
    <div id="perm-banner" class="banner banner-warn" onclick="reqNotif()" style="display:none">
      ⚠️ Activer les notifications écran de verrouillage → Appuyez ici
    </div>
    <div id="sw-ok" class="banner banner-ok" style="display:none">
      ✓ Notifications en arrière-plan actives
    </div>
    <div class="ai-card">
      <div class="ai-lbl">Créer des rappels via IA</div>
      <textarea class="ai-ta" id="ai-input" placeholder="Ex: Rappelle-moi de prendre mes médicaments dans 1h, 4h et 8h — urgent"></textarea>
      <div class="ai-foot">
        <div class="chips">
          <span class="chip" onclick="setIn('Boire de l\u0027eau toutes les 30 min pendant 2h')">💧 Eau ×4</span>
          <span class="chip" onclick="setIn('Médicaments dans 1h, 4h et 8h — urgent')">💊 Médoc</span>
          <span class="chip" onclick="setIn('Réunion dans 15 min — urgent')">📅 Réunion</span>
          <span class="chip" onclick="setIn('Pause dans 45 min et dans 2h')">☕ Pauses</span>
          <span class="chip" onclick="setIn('Vérifier positions trading dans 30min, 1h et 2h — urgent')">📈 Trading</span>
        </div>
        <button class="ai-btn" id="ai-btn" onclick="sendAI()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="ai-status" id="ai-status"></div>
    </div>
    <div class="sec-lbl" id="sec-lbl" style="display:none">À venir</div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty">
      <div class="empty-icon">🔔</div>
      <div class="empty-text">Aucun rappel prévu<br>Décrivez vos besoins en français naturel</div>
    </div>
  </div>
  <div class="alarm-wrap" id="alarm-wrap">
    <div class="alarm-box">
      <div class="alarm-anim" id="alarm-anim">🔔</div>
      <div class="alarm-badge" id="alarm-badge"></div>
      <div class="alarm-msg" id="alarm-msg"></div>
      <div class="alarm-time" id="alarm-time"></div>
      <button class="alarm-ok" id="alarm-ok" onclick="dismiss()">OK — Compris</button>
    </div>
  </div>
</div>
<script>
let reminders=[],audioCtx=null,alarmLoop=null,currentAlarm=null,swReg=null;
function audio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playSound(imp){try{const ctx=audio();if(ctx.state==='suspended')ctx.resume();const p=imp==='urgent'?[{f:880,t:0,d:.11},{f:880,t:.17,d:.11},{f:880,t:.34,d:.11},{f:1100,t:.54,d:.24},{f:1100,t:.84,d:.24}]:[{f:523,t:0,d:.22},{f:659,t:.32,d:.20}];p.forEach(({f,t,d})=>{const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.frequency.value=f;osc.type=imp==='urgent'?'square':'sine';const s=ctx.currentTime+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(imp==='urgent'?.28:.18,s+.025);g.gain.linearRampToValueAtTime(0,s+d);osc.start(s);osc.stop(s+d+.06)})}catch(e){}}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function fmt(dt){const d=new Date(dt),n=new Date(),tm=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});return d.toDateString()===n.toDateString()?`Aujourd'hui à ${tm}`:d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+` à ${tm}`}
function cd(dt){const ms=new Date(dt)-new Date();if(ms<=0)return'Maintenant';const m=Math.floor(ms/60000),h=Math.floor(m/60),rm=m%60;if(h>0)return`dans ${h}h${rm>0?rm+'min':''}`;if(m>0)return`dans ${m} min`;return'dans < 1 min'}
function uid(){return`r_${Date.now()}_${Math.random().toString(36).slice(2)}`}
function save(){localStorage.setItem('rappel_ia_v3',JSON.stringify(reminders))}
function load(){try{const raw=localStorage.getItem('rappel_ia_v3');if(raw){const now=new Date();reminders=JSON.parse(raw).filter(r=>new Date(r.datetime)>now)}}catch(e){reminders=[]}render()}
async function registerSW(){if(!('serviceWorker'in navigator))return;try{swReg=await navigator.serviceWorker.register('./sw.js');document.getElementById('sw-ok').style.display='flex';navigator.serviceWorker.addEventListener('message',e=>{if(e.data.type==='FIRED'){reminders=reminders.filter(r=>r.id!==e.data.id);save();render()}});swMsg({type:'PING'})}catch(e){console.warn('SW:',e)}}
function swMsg(msg){if(swReg&&swReg.active){swReg.active.postMessage(msg);return}if(navigator.serviceWorker)navigator.serviceWorker.ready.then(reg=>reg.active&&reg.active.postMessage(msg))}
function render(){const now=new Date(),upcoming=reminders.filter(r=>new Date(r.datetime)>now).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)),list=document.getElementById('list'),empty=document.getElementById('empty'),lbl=document.getElementById('sec-lbl');if(!upcoming.length){list.innerHTML='';empty.style.display='block';lbl.style.display='none';return}empty.style.display='none';lbl.style.display='block';list.innerHTML=upcoming.map(r=>`<div class="r-card"><div class="r-icon ${r.importance}">${r.importance==='urgent'?'🚨':'🔔'}</div><div class="r-body"><div class="r-msg">${r.message}</div><div class="r-meta"><span class="r-badge ${r.importance}">${r.importance==='urgent'?'URGENT':'NORMAL'}</span><span id="cd-${r.id}">${cd(r.datetime)}</span> · ${fmt(r.datetime)}</div></div><button class="r-del" onclick="delR('${r.id}')">✕</button></div>`).join('')}
function delR(id){reminders=reminders.filter(r=>r.id!==id);save();swMsg({type:'DELETE',id});render()}
function checkLoop(){if(!currentAlarm){const now=new Date(),due=reminders.find(r=>new Date(r.datetime)<=now);if(due)showAlarm(due)}reminders.forEach(r=>{const el=document.getElementById(`cd-${r.id}`);if(el)el.textContent=cd(r.datetime)})}
function showAlarm(r){currentAlarm=r;reminders=reminders.filter(x=>x.id!==r.id);save();document.getElementById('alarm-anim').className=`alarm-anim ${r.importance}`;document.getElementById('alarm-anim').textContent=r.importance==='urgent'?'🚨':'🔔';document.getElementById('alarm-badge').className=`alarm-badge ${r.importance}`;document.getElementById('alarm-badge').textContent=r.importance==='urgent'?'URGENT':'RAPPEL';document.getElementById('alarm-msg').textContent=r.message;document.getElementById('alarm-time').textContent=fmt(r.datetime);document.getElementById('alarm-ok').className=`alarm-ok ${r.importance}`;document.getElementById('alarm-wrap').classList.add('on');playSound(r.importance);alarmLoop=setInterval(()=>playSound(r.importance),r.importance==='urgent'?3000:5500)}
function dismiss(){clearInterval(alarmLoop);currentAlarm=null;document.getElementById('alarm-wrap').classList.remove('on');render()}
async function reqNotif(){const p=await Notification.requestPermission();if(p==='granted')document.getElementById('perm-banner').style.display='none'}
function setIn(txt){document.getElementById('ai-input').value=txt;document.getElementById('ai-input').focus()}
async function sendAI(){const input=document.getElementById('ai-input').value.trim();if(!input)return;const btn=document.getElementById('ai-btn'),status=document.getElementById('ai-status');btn.disabled=true;status.innerHTML='Analyse en cours <span class="dots"><span>.</span><span>.</span><span>.</span></span>';const nowStr=new Date().toLocaleString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`Tu analyses des demandes de rappels en français et retournes UNIQUEMENT du JSON valide, sans backticks ni commentaires.\nDate et heure actuelles : ${nowStr}\nFormat JSON :\n{"reminders":[{"message":"texte court (max 50 chars)","datetime":"2025-01-15T14:30:00","importance":"normal"}],"summary":"phrase résumant ce qui a été créé"}\nRègles :\n- Calcule les heures exactes depuis maintenant\n- importance = "urgent" si urgent/important/critique mentionné, sinon "normal"\n- Pour rappels répétés créé un rappel par occurrence (max 12)\n- datetime ISO 8601 local sans timezone`,messages:[{role:'user',content:input}]})});const data=await res.json();const raw=data.content?.[0]?.text||'';let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim())}catch(e){throw new Error('Réponse IA invalide')}const now=new Date();const added=(parsed.reminders||[]).map(r=>({...r,id:uid()})).filter(r=>new Date(r.datetime)>now);if(!added.length)throw new Error('Aucune heure future dans la demande');reminders=[...reminders,...added];save();added.forEach(r=>swMsg({type:'ADD',reminder:r}));status.textContent=parsed.summary||`${added.length} rappel(s) créé(s)`;document.getElementById('ai-input').value='';render();setTimeout(()=>{status.textContent=''},5000)}catch(e){status.style.color='var(--c-urgent)';status.textContent='⚠ '+(e.message||'Erreur');setTimeout(()=>{status.textContent='';status.style.color=''},4000)}btn.disabled=false}
tick();setInterval(tick,1000);setInterval(checkLoop,10000);load();registerSW();
if('Notification'in window&&Notification.permission==='default')document.getElementById('perm-banner').style.display='flex';
document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI()}});
document.addEventListener('visibilitychange',()=>{if(!document.hidden){load();swMsg({type:'PING'})}});
</script>
</body>
</html>
